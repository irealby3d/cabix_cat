<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Cabix Mebel — Premium Oshxona Katalogi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════ HOME VIEW -->
<div id="home-view" class="view active">
    <header class="home-header">
        <div class="brand">
            <div class="brand-mark">C</div>
            <div class="brand-text">
                <h1>CABIX MEBEL</h1>
                <p>Premium Oshxona Modullari</p>
            </div>
        </div>
    </header>

    <main class="home-main">
        <div class="home-hero">
            <span class="hero-eyebrow">2024 KOLLEKSIYA</span>
            <h2>Bizning Katalog</h2>
            <p>Sifat va nafislikning mukammal uyg'unligi</p>
        </div>

        <div class="category-grid" id="category-grid"></div>
    </main>

    <footer class="home-footer">
        <p>© 2024 Cabix Mebel · Premium Oshxona Yechimlari</p>
    </footer>
</div>

<!-- ═══════════════════════════════════════════ BOOK VIEW (overlay) -->
<div id="book-view" class="view-overlay">

    <!-- Top Bar -->
    <div class="reader-topbar">
        <button class="topbar-btn" onclick="goHome()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
            Orqaga
        </button>

        <div class="reader-title" id="reader-title">Katalog</div>

        <div class="topbar-actions">
            <button class="icon-btn" id="thumbs-btn" onclick="toggleThumbs()" title="Eskizlar (T)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </button>
            <button class="icon-btn" id="fs-btn" onclick="toggleFullscreen()" title="To'liq ekran (F)">
                <svg id="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15,3 21,3 21,9"/>
                    <polyline points="9,21 3,21 3,15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/>
                    <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Reader Body -->
    <div class="reader-body">

        <!-- Thumbnail Sidebar -->
        <aside class="thumbs-panel" id="thumbs-panel">
            <div class="thumbs-title">Sahifalar</div>
            <div class="thumbs-list" id="thumbs-list"></div>
        </aside>

        <!-- Book Area -->
        <div class="flipbook-area" id="flipbook-area">
            <div class="flipbook-zoom-wrapper" id="zoom-wrapper">
                <div id="flipbook"></div>
            </div>

            <!-- Ghost click zones -->
            <div class="ghost-zone ghost-left"  onclick="flipPrev()"></div>
            <div class="ghost-zone ghost-right" onclick="flipNext()"></div>
        </div>
    </div>

    <!-- Bottom Toolbar -->
    <div class="reader-toolbar">
        <button class="tool-btn" id="prev-btn" onclick="flipPrev()" title="Oldingi (←)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        </button>

        <div class="page-counter">
            <input type="number" id="page-input" min="1" value="1" title="Sahifaga o'tish">
            <span class="sep">/</span>
            <span id="total-pages">11</span>
        </div>

        <button class="tool-btn" id="next-btn" onclick="flipNext()" title="Keyingi (→)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
        </button>

        <div class="toolbar-sep"></div>

        <button class="tool-btn" onclick="zoomOut()" title="Kichiklashtirish (-)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </button>

        <span class="zoom-display" id="zoom-display">100%</span>

        <button class="tool-btn" onclick="zoomIn()" title="Kattalashtirish (+)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </button>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-screen" id="loading-screen">
    <div class="loader-ring"></div>
    <p>Yuklanmoqda…</p>
</div>

<script src="script.js"></script>
</body>
</html>
