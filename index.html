<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f59e0b">
    <title>Cabix Mebel - Oshxona Modullari Katalogi</title>
    <link rel="stylesheet" href="style.css">
    <!-- Professional PageFlip kutubxonasi -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>Cabix Mebel</h1>
            <p class="tagline">Premium Oshxona Modullari</p>
        </div>
    </header>

    <main class="catalog-container">
        <!-- Bosh sahifa -->
        <div id="home-view" class="view active">
            <div class="intro-section">
                <h2>Katalogimiz</h2>
                <p>Sifat va nafislikning mukammal uyg'unligi</p>
            </div>
            <div class="category-grid" id="category-grid"></div>
        </div>

        <!-- To'liq ekranli Kitob ko'rinishi -->
        <div id="book-view" class="view">
            <div class="book-controls">
                <button class="control-btn" onclick="goHome()">← Bosh sahifa</button>
                <div class="page-indicator">
                    Sahifa: <span id="current-page">1</span> / <span id="total-pages">11</span>
                </div>
            </div>

            <div class="flipbook-wrapper">
                <div id="flipbook">
                    <!-- Sahifalar JavaScript orqali shu yerga joylanadi -->
                </div>
            </div>

            <div class="flipbook-nav">
                <button class="nav-btn" id="prev-btn" onclick="flipPrev()">❮ Oldingi</button>
                <button class="nav-btn" id="next-btn" onclick="flipNext()">Keyingi ❯</button>
            </div>
            
            <p class="flip-hint">💡 Sahifani barmoq yoki sichqoncha bilan tortib varoqlang</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
